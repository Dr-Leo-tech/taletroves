/*Tale Trove Loader */
/* full screen loader */
#loader{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #0f172a;
  display: flex;
  align-items: center;

    <!-- Tale Trove Loader -->

<!-- SIGNUP -->
<div class="box" id="signupBox">
  <h2>Create Account</h2>
  <div class="input">
  <input type="text" id="suUsername" placeholder="Username" required/>
  <input 
  type="text" 
  placeholder="Date of Birth"
  id="suDob"
  onfocus="openDate(this)"
  onblur="(this.value === '' ? this.type='text' : this.type='date')"
  required>

  <input type="email" id="suEmail" placeholder="Email" required/>
  <select id="suGender">
    <option value="">Select Gender</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
  </select>
  <input type="password" id="suPassword" placeholder="Password" />
  </div>
  <label>
    <input type="checkbox" id="isAuthor">
    Register as Author
  </label>
  <button onclick="signup()">Sign Up</button>
  <div class="link" onclick="showLogin()">Already have an account?</div>
  <br>
  <a href="Guest.html"><div class="guest">Continue as Guest</div></a>
</div>

<!-- LOGIN -->
<div class="box hidden" id="loginBox">
  <h2>Login</h2>
  <div class="input">
  <input type="email" id="liEmail" placeholder="Email"  required/>
  <input type="password" id="liPassword" placeholder="Password" required/>
  </div>
  <button onclick="login()">Login</button>
  <div class="link" onclick="showSignup()">Create account</div>
  <br>
  <a href="Guest.html"><div class="guest">Continue as Guest</div></a>
</div>

<!-- DASHBOARD -->
<div class="box hidden" id="dashboard">
  <h2>Welcome 👋</h2>
  <p id="welcomeUser"></p>
  <button onclick="logout()">Logout</button>
</div>


<script>
  // 1. Initialize Supabase
  const supabaseUrl = 'https://oadbiabeqavrvtymcvuv.supabase.co';
  const supabaseKey = 'sb_publishable_cQvpBFh00y0lujudlGhlJQ_ltN3ltN7';
  let supabaseClient = null;

  function initSupabase() {
    if (typeof supabase !== 'undefined') {
      supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
      return true;
    }
    return false;
  }

 window.onload = async () => {
    const loader = document.getElementById("appLoader");

    try {
        // 1. Initialize Supabase
        initSupabase();

        // 2. Check session (Await this to prevent flickering)
        // This checks if the user is already logged in and redirects if necessary
        await checkUserSession();

    } catch (err) {
        console.error("Initialization error:", err);
    } finally {
        // 3. The 'finally' block ensures the loader is removed 
        // even if the code above hits an error (prevents crashing).
        if (loader) {
            // Optional: Add a fade-out effect
            loader.style.opacity = "0";
            setTimeout(() => {
                loader.style.display = "none";
            }, 500); // Matches a 0.5s CSS transition
        }
    }
};


  // --- AUTH LOGIC ---
  async function signup() {
  if (!supabaseClient && !initSupabase()) return;

  const email = document.getElementById('suEmail').value;
  const password = document.getElementById('suPassword').value;
  const username = document.getElementById('suUsername').value;
  const dob = document.getElementById('suDob').value;
  const gender = document.getElementById('suGender').value;
  const isAuthor = document.getElementById('isAuthor').checked;

  try {
    const { data, error } = await supabaseClient.auth.signUp({
      email,
      password,
      options: {
        // This tells Supabase where to send the user AFTER they click confirm
        emailRedirectTo: window.location.origin + '/home.html', 
        data: { 
          display_name: username, 
          dob: dob, 
          gender: gender, 
          role: isAuthor ? 'author' : 'reader' 
        }
      }
    });

    if (error) {
      alert(error.message);
    } else {
      // Important: Inform the user to check their email!
      alert("Signup successful! Please check your email to confirm your account before logging in.");
      showLogin();
    }
  } catch (err) { 
    alert(err.message); 
  }
}


  async function login() {
    if (!supabaseClient && !initSupabase()) return;

    const email = document.getElementById('liEmail').value;
    const password = document.getElementById('liPassword').value;

    try {
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        alert("Login failed: " + error.message);
      } else {
        // REDIRECT TO DASHBOARD
        window.location.href = "home.html";
      }
    } catch (err) { alert(err.message); }
  }

  async function checkUserSession() {
    if (!supabaseClient && !initSupabase()) return;
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (user) {
      window.location.href = "home.html";
    }
  }

  // --- UI TOGGLES ---
  function showLogin() {
    document.getElementById('signupBox').classList.add('hidden');
    document.getElementById('loginBox').classList.remove('hidden');
  }
  function showSignup() {
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('signupBox').classList.remove('hidden');
  }

function openDate(el){
  el.type = "date";
  // Small delay ensures the browser has rendered the type change before picking
  setTimeout(() => {
    el.showPicker && el.showPicker();
  }, 10);
}

//logo loader
window.addEventListener("load", function(){
        
        setTimeout(() => {
          document.getElementById("loader").style.opacity="0";
          document.getElementById("loader").style.transition="0.5s";
          
          setTimeout(() => {
            document.getElementById("loader").style.display="none";
          },500)
        },2500)
      })
</script>


</body>
