 label{

<!-- SIGNUP -->
<div class="box" id="signupBox">
  <h2>Create Account</h2>
  <div class="input">
  <input type="text" id="suUsername" placeholder="Username" required/>
  <input 
  type="text" 
  placeholder="Date of Birth"
  id="suDob"
  onfocus="openDate(this)"
  onblur="(this.value === '' ? this.type='text' : this.type='date')"
  required>

  <input type="email" id="suEmail" placeholder="Email" required/>
  <select id="suGender">
    <option value="">Select Gender</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
  </select>
  <input type="password" id="suPassword" placeholder="Password" />
  </div>
  <label>
    <input type="checkbox" id="isAuthor">
    Register as Author
  </label>
  <button onclick="signup()" id="signupBtn">Sign Up</button>
  <div class="link" onclick="showLogin()">Already have an account?</div>
  <br>
  <a href="guest.html"><div class="guest">Continue as Guest</div></a>
</div>

<!-- LOGIN -->
<div class="box hidden" id="loginBox">
  <h2>Login</h2>
  <div class="input">
  <input type="email" id="liEmail" placeholder="Email"  required/>
  <input type="password" id="liPassword" placeholder="Password" required/>
  </div>
  <button onclick="login()" id="loginBtn">Login</button>
  <div class="link" onclick="showSignup()">Create account</div>
  <br>
  <a href="guest.html"><div class="guest">Continue as Guest</div></a>
</div>

<!-- DASHBOARD -->
<div class="box hidden" id="dashboard">
  <h2>Welcome 👋</h2>
  <p id="welcomeUser"></p>
  <button onclick="logout()">Logout</button>
</div>


<script>
  const supabaseUrl = 'https://oadbiabeqavrvtymcvuv.supabase.co';
  const supabaseKey = 'sb_publishable_cQvpBFh00y0lujudlGhlJQ_ltN3ltN7';

  // Declared here so all functions can access it, initialized in window.onload
  let supabaseClient = null;

  // --- LOADING HELPER ---
  function setLoading(btnId, isLoading, defaultText) {
    const btn = document.getElementById(btnId);
    if (!btn) return;
    btn.disabled = isLoading;
    btn.innerHTML = isLoading
      ? `<span class="spinner"></span> Please wait...`
      : defaultText;
  }

  // --- AUTH LOGIC ---
  async function signup() {
    if (!supabaseClient) {
      alert("App is still loading. Please wait a moment and try again.");
      return;
    }
    setLoading('signupBtn', true);
    const email = document.getElementById('suEmail').value;
    const password = document.getElementById('suPassword').value;
    const username = document.getElementById('suUsername').value;
    const dob = document.getElementById('suDob').value;
    const gender = document.getElementById('suGender').value;
    const isAuthor = document.getElementById('isAuthor').checked;

    try {
      const { data, error } = await supabaseClient.auth.signUp({
        email,
        password,
        options: {
          emailRedirectTo: window.location.origin + '/home.html',
          data: {
            display_name: username,
            dob: dob,
            gender: gender,
            role: isAuthor ? 'author' : 'reader'
          }
        }
      });

      if (error) {
        alert(error.message);
      } else {
        alert("Signup successful! Please check your email to confirm your account before logging in.");
        showLogin();
      }
   } catch (err) {
  alert(err.message || err.toString() || "An unexpected error occurred.");
    } finally {
      setLoading('signupBtn', false, 'Sign Up');
    }
  }

  async function login() {
    if (!supabaseClient) {
      alert("App is still loading. Please wait a moment and try again.");
      return;
    }
    setLoading('loginBtn', true);
    const email = document.getElementById('liEmail').value;
    const password = document.getElementById('liPassword').value;

    try {
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        alert("Login failed: " + error.message);
        setLoading('loginBtn', false, 'Login');
      } else {
        window.location.href = "home.html";
      }
    } catch (err) {
  alert(err.message || err.toString() || "An unexpected error occurred.");
    }
  }

  // --- UI TOGGLES ---
  function showLogin() {
    document.getElementById('signupBox').classList.add('hidden');
    document.getElementById('loginBox').classList.remove('hidden');
  }
  function showSignup() {
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('signupBox').classList.remove('hidden');
  }

  function openDate(el) {
    el.type = "date";
    setTimeout(() => {
      el.showPicker && el.showPicker();
    }, 10);
  }

  // --- HIDE LOADER — runs immediately, independent of Supabase ---
  // This guarantees the loader always disappears after 2.5s no matter what
  function hideLoader() {
    const loader = document.getElementById("loader");
    if (!loader) return;
    setTimeout(() => {
      loader.style.transition = "opacity 0.5s";
      loader.style.opacity = "0";
      setTimeout(() => { loader.style.display = "none"; }, 500);
    }, 2500);
  }
  hideLoader();

  // --- ON PAGE LOAD ---
  // Poll until supabase global is ready (handles slow CDN loads)
  function waitForSupabase(callback) {
    if (typeof supabase !== 'undefined') {
      callback();
    } else {
      setTimeout(() => waitForSupabase(callback), 50);
    }
  }

  waitForSupabase(async () => {
    supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
    try {
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (user) {
        window.location.href = "home.html";
      }
    } catch (err) {
      console.error("Session check error:", err);
    }
  });
</script>

<!-- Supabase loaded at end of body so it never blocks page render -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
