    <script>
    // Supabase configuration
const supabaseUrl = 'https://oadbiabeqavrvtymcvuv.supabase.co';
const supabaseKey = 'sb_publishable_cQvpBFh00y0lujudlGhlJQ_ltN3ltN7';
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

async function loadGuestStories() {
    // 1. Updated Select query to fetch counts for likes and comments
    const { data, error } = await supabaseClient
        .from('stories')
        .select(`
            id, 
            title, 
            content,
            likes(count),
            comments(count)
        `)
        .limit(6) 
        .order('created_at', { ascending: false });

    const grid = document.getElementById('guestStoriesGrid');
    
    if (error || !data) {
        grid.innerHTML = "<p>Error loading stories. Please try again later.</p>";
        return;
    }

    grid.innerHTML = data.map(story => {
        // 2. Extract counts safely (similar to Stories.html logic)
        const likeCount = story.likes?.[0]?.count || 0;
        const commentCount = story.comments?.[0]?.count || 0;

        return `
            <div class="story-card">
                <div>
                    <h3 style="color: #764ba2; margin-top: 0;">${story.title}</h3>
                    <p style="color: #666; font-size: 0.95em; line-height: 1.6;">
                        ${story.content.substring(0, 100)}...
                    </p>
                    
                    <div style="margin-bottom: 15px; font-size: 0.9em; color: #764ba2;">
                        <span style="margin-right: 15px;">❤️ ${likeCount}</span>
                        <span>💬 ${commentCount}</span>
                    </div>

                    <a href="Story.html?id=${story.id}" style="color: #764ba2; font-weight: bold; text-decoration: none;">Read More →</a>
                </div>
                
                <div class="story-actions">
                    <button class="guest-btn" onclick="restrictedAction()">❤️ Like</button>
                    <button class="guest-btn" onclick="restrictedAction()">💬 Comment</button>
                </div>
            </div>
        `;
    }).join('');
}

function restrictedAction() {
    alert("You need to be logged in to like or comment on stories!");
    window.location.href = "index.html"; 
}

window.onload = loadGuestStories;
  </script>
